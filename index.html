        .ad-slot { width: 100%; min-height: 90px; background: #050505; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #1a1a1a; position: relative; padding: 10px 0; }

        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        .play-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(90deg, #00e5ff, #00ff88); color: black; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .play-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 229, 255, 0.3); }

        #statusText { display: none; color: var(--primary); font-size: 14px; margin-top: 15px; font-weight: bold; letter-spacing: 1px; }

        /* --- DOUBLE AD OVERLAY MODAL --- */
        #ad-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .overlay-content { background: #0d0f14; border: 1px solid var(--primary); border-radius: 16px; padding: 15px; text-align: center; width: 95%; max-width: 380px; box-shadow: 0 0 40px rgba(0, 229, 255, 0.15); display: flex; flex-direction: column; align-items: center; max-height: 98vh; overflow-y: auto; }
        
        .big-ad-box { width: 300px; height: 250px; background: #050505; border: 1px solid #222; border-radius: 8px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; margin: 10px 0; }
        
        .timer-section { margin: 5px 0; padding: 10px; width: 100%; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px dashed rgba(0,229,255,0.3); }
        #overlay-timer { font-size: 32px; font-weight: 800; color: var(--primary); margin: 5px 0; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }

        #cinema-wrapper { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #000; z-index: 10000; flex-direction: column; }
        .top-bar { padding: 15px 25px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: absolute; top: 0; left: 0; width: 100%; z-index: 10001; display: flex; justify-content: space-between; align-items: flex-start; }
        .close-player { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .controls-right { display: flex; gap: 10px; align-items: center; }
        .glass-select { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); color: var(--primary); border: 1px solid var(--primary); padding: 8px 12px; border-radius: 8px; outline: none; font-weight: bold; }
        .dl-icon { background: var(--primary); color: black; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Style for Native Banner Container */
        #native-ad-container { width: 100%; margin-bottom: 20px; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

<script>
    // --- JavaScript Logic remains the same as your provided code ---
    window.onload = function() {
        if (localStorage.getItem('agreed_to_be_good') === 'yes') {
            document.getElementById('tos-overlay').style.display = 'none';
        }
    }

    function toggleAgreeBtn() {
        const cb = document.getElementById('tos-checkbox');
        const btn = document.getElementById('agreeBtn');
        btn.disabled = !cb.checked;
        btn.className = cb.checked ? 'agree-btn active' : 'agree-btn';
    }

    function acceptTOS() {
        localStorage.setItem('agreed_to_be_good', 'yes');
        document.getElementById('tos-overlay').style.display = 'none';
    }

    let fetchedVideoData = null; 
    let fetchedStreams = {};     
    let fetchedDirectLink = "";  
    let apiFailed = false;

    async function startProcess() {
        const url = document.getElementById('linkBox').value;
        if(!url.includes('tera')) return alert("Please enter a valid TeraBox link.");

        const overlay = document.getElementById('ad-overlay');
        overlay.style.display = 'flex';
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('statusText').style.display = 'block';
        
        preloadVideo(url);

        let timeLeft = 15;
        const timerElement = document.getElementById('overlay-timer');
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                if (fetchedVideoData) {
                    overlay.style.display = 'none'; 
                    launchPlayer();
                } else if (apiFailed) {
                    alert("API Busy. Try again.");
                    location.reload();
                }
            }
        }, 1000);
    }

    async function preloadVideo(url) {
        try {
            const response = await fetch('https://terabox-downloader-api2.p.rapidapi.com/v1', {
                method: 'POST',
                headers: {
                    'x-rapidapi-key': 'f26f059259msh01744200cf35cdap1a2e94jsn87882966dadc',
                    'x-rapidapi-host': 'terabox-downloader-api2.p.rapidapi.com',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ platform: "terabox", media_type: "video", quality: "auto", link: url })
            });
            const data = await response.json();
            if(data.result) {
                fetchedStreams = data.result.fast_streams || {};
                fetchedDirectLink = data.result.direct_link;
                fetchedVideoData = fetchedStreams['720p'] || data.result.stream_url || data.result.direct_link;
                const player = document.getElementById('mainPlayer');
                player.src = fetchedVideoData;
                player.load();
            } else { apiFailed = true; }
        } catch (e) { apiFailed = true; }
    }

    function launchPlayer() {
        const player = document.getElementById('mainPlayer');
        const qSelect = document.getElementById('qualitySelect');
        const dlBtn = document.getElementById('downloadBtn');
        qSelect.innerHTML = '';
        for (let q in fetchedStreams) {
            let opt = document.createElement('option');
            opt.value = fetchedStreams[q];
            opt.innerText = q;
            qSelect.appendChild(opt);
        }
        dlBtn.href = fetchedDirectLink || fetchedVideoData;
        document.getElementById('main-container').style.display = 'none';
        document.getElementById('cinema-wrapper').style.display = 'flex';
        player.play();
    }
</script>
