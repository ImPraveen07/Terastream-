<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeraStream Pro - Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00e5ff; --bg: #08090d; --text-dim: #8b92a5; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; margin: 0; overflow-x: hidden; 
            display: flex; flex-direction: column; min-height: 100vh;
            user-select: none; -webkit-user-select: none;
        }

        /* --- UI CLEANUP --- */
        .ad-slot { width: 100%; min-height: 90px; background: #050505; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #1a1a1a; padding: 10px 0; }
        #main-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        
        #home-screen { 
            width: 100%; max-width: 500px; padding: 30px; 
            background: rgba(255,255,255,0.02); border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
        }

        h1 { font-weight: 800; font-size: 2rem; background: linear-gradient(90deg, #00e5ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 10px 0; }
        
        /* Input is now on TOP for better UX */
        .input-box { 
            width: 100%; padding: 18px; border-radius: 14px; border: 1px solid #333; 
            background: #000; color: #fff; margin-bottom: 15px; outline: none; font-size: 15px;
            user-select: text !important;
        }
        .play-btn { 
            width: 100%; padding: 18px; border-radius: 14px; border: none; 
            background: linear-gradient(90deg, #00e5ff, #00ff88); color: black; 
            font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* Ads placed BELOW the action button */
        #native-ad-container { width: 100%; margin-top: 25px; border-radius: 12px; overflow: hidden; min-height: 100px; background: rgba(0,0,0,0.3); }

        /* --- FAST TIMER OVERLAY --- */
        #ad-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0, 0, 0, 0.98); z-index: 9999; display: none; 
            flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(12px); 
        }
        .overlay-content { width: 95%; max-width: 380px; text-align: center; }
        
        .big-ad-box { 
            width: 300px; height: 250px; background: #000; border: 1px solid #222; 
            margin: 10px auto; border-radius: 12px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .timer-circle {
            width: 70px; height: 70px; border: 3px solid var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 10px auto; font-size: 28px; font-weight: 800; color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        /* --- PLAYER --- */
        #cinema-wrapper { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #000; z-index: 10000; }
        .top-bar { padding: 15px; position: absolute; top: 0; width: 100%; z-index: 10001; display: flex; justify-content: space-between; }
        .close-player { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        video { width: 100%; height: 100%; background: #000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- TOP BANNER -->
    <div class="ad-slot">
        <script type="text/javascript">
            atOptions = { 'key' : '11e27d7882262d961361c7032bff6f7d', 'format' : 'js', 'height' : 90, 'width' : 728, 'params' : {} };
        </script>
        <script type="text/javascript" src="//www.highperformanceformat.com/11e27d7882262d961361c7032bff6f7d/invoke.js"></script>
    </div>

    <div id="main-container">
        <div id="home-screen">
            <h1>TeraStream Pro</h1>
            <p style="color:var(--text-dim); font-size: 12px; margin-bottom: 20px;">Fastest No-App Player</p>

            <!-- INPUT FIRST -->
            <input type="text" id="linkBox" class="input-box" placeholder="Paste TeraBox Link..." spellcheck="false">
            <button class="play-btn" id="playBtn" onclick="startProcess()">Unlock Stream</button>

            <!-- NATIVE AD BELOW BUTTON -->
            <div id="native-ad-container">
                <script async="async" data-cfasync="false" src="https://pl29436277.profitablecpmratenetwork.com/f66769b56b44248314261841a0e4e0c9/invoke.js"></script>
                <div id="container-f66769b56b44248314261841a0e4e0c9"></div>
            </div>
        </div>
    </div>

    <!-- 8-SECOND OVERLAY -->
    <div id="ad-overlay">
        <div class="overlay-content">
            <div id="ad-box-1" class="big-ad-box">
                <script type="text/javascript">
                    atOptions = { 'key' : '18ea0a28b5dca9cb89e786e8828bab39', 'format' : 'js', 'height' : 250, 'width' : 300, 'params' : {} };
                </script>
                <script type="text/javascript" src="//www.highperformanceformat.com/18ea0a28b5dca9cb89e786e8828bab39/invoke.js"></script>
            </div>

            <div class="timer-circle" id="count-display">8</div>
            <p style="font-size: 11px; color: #555;">Server Tunneling... Please wait</p>

            <div id="ad-box-2" class="big-ad-box">
                <script type="text/javascript">
                    atOptions = { 'key' : '18ea0a28b5dca9cb89e786e8828bab39', 'format' : 'js', 'height' : 250, 'width' : 300, 'params' : {} };
                </script>
                <script type="text/javascript" src="//www.highperformanceformat.com/18ea0a28b5dca9cb89e786e8828bab39/invoke.js"></script>
            </div>
        </div>
    </div>

    <!-- PLAYER -->
    <div id="cinema-wrapper">
        <div class="top-bar">
            <button class="close-player" onclick="location.reload()">⬅ EXIT</button>
            <a id="downloadBtn" href="#" style="background:var(--primary); color:black; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:800;">SAVE</a>
        </div>
        <video id="mainPlayer" controls playsinline></video>
    </div>

<script>
    let fetchedVideoData = null;
    let apiReady = false;

    async function startProcess() {
        const url = document.getElementById('linkBox').value;
        if(!url.includes('tera')) return alert("Invalid Link");

        document.getElementById('ad-overlay').style.display = 'flex';
        
        // START FETCHING IMMEDIATELY (Invisible to user)
        preloadVideo(url);

        let timeLeft = 8; // REDUCED TIMER
        const timerDisplay = document.getElementById('count-display');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;

            // SMART SWAP: Refresh ads visually at 4 seconds
            if(timeLeft === 4) {
                document.querySelectorAll('.big-ad-box').forEach(el => el.style.opacity = '0.5');
                setTimeout(() => {
                    document.querySelectorAll('.big-ad-box').forEach(el => el.style.opacity = '1');
                }, 200);
            }
            
            if(timeLeft <= 0) {
                clearInterval(countdown);
                checkAndLaunch();
            }
        }, 1000);
    }

    async function preloadVideo(url) {
        try {
            const response = await fetch('https://terabox-downloader-api2.p.rapidapi.com/v1', {
                method: 'POST',
                headers: {
                    'x-rapidapi-key': 'f26f059259msh01744200cf35cdap1a2e94jsn87882966dadc',
                    'x-rapidapi-host': 'terabox-downloader-api2.p.rapidapi.com',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ platform: "terabox", media_type: "video", quality: "auto", link: url })
            });

            const data = await response.json();
            if(data.result) {
                fetchedVideoData = data.result.fast_streams?.['720p'] || data.result.stream_url || data.result.direct_link;
                const player = document.getElementById('mainPlayer');
                player.src = fetchedVideoData;
                player.load(); // BUFFERING WHILE ADS SHOW
                apiReady = true;
                document.getElementById('downloadBtn').href = data.result.direct_link || fetchedVideoData;
            }
        } catch (e) { apiReady = "failed"; }
    }

    function checkAndLaunch() {
        if (apiReady === true) {
            document.getElementById('ad-overlay').style.display = 'none';
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('cinema-wrapper').style.display = 'block';
            document.getElementById('mainPlayer').play();
        } else if (apiReady === "failed") {
            alert("API Error. Please try again.");
            location.reload();
        } else {
            // If API is slow, wait 1 more second
            setTimeout(checkAndLaunch, 1000);
        }
    }

    // Security: Block Inspect
    document.addEventListener('keydown', e => {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && e.key === "I")) e.preventDefault();
    });
</script>
</body>
</html>
