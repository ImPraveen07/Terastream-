<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeraStream Pro - Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00e5ff; --bg: #08090d; --text-dim: #8b92a5; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; user-select: none; }

        /* --- THE FLICKER FIX: display: none is default --- */
        #tos-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 6, 8, 0.98); z-index: 9999999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .tos-content { background: #0d0f14; border: 1px solid #1c1f26; width: 95%; max-width: 580px; padding: 30px; border-radius: 20px; }
        .tos-header { color: var(--primary); font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 15px; }
        .tos-body { height: 220px; overflow-y: auto; background: #000; padding: 20px; border-radius: 10px; font-size: 12px; color: var(--text-dim); line-height: 1.8; margin-bottom: 15px; border: 1px solid #111; }
        .agree-btn { width: 100%; padding: 16px; border-radius: 10px; border: none; background: #1a1e26; color: #555; font-weight: 800; cursor: not-allowed; }
        .agree-btn.active { background: linear-gradient(90deg, #00e5ff, #00ff88); color: #000; cursor: pointer; }

        .ad-slot { width: 100%; min-height: 60px; background: #000; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #1a1a1a; padding: 10px 0; }
        #main-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .play-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; background: linear-gradient(90deg, #00e5ff, #00ff88); color: black; font-weight: 800; cursor: pointer; }
        .input-box { width: 100%; padding: 18px; border-radius: 14px; border: 1px solid #333; background: #000; color: #fff; margin: 15px 0; outline: none; }
        #ad-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.98); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .timer-wrap { width: 60px; height: 60px; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--primary); }
        #cinema-wrapper { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #000; z-index: 20000000; flex-direction: column; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .hide-ads { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="tos-overlay">
        <div class="tos-content">
            <div class="tos-header">✨ Welcome ✨</div>
            <div class="tos-body">Hey bestie! Agree to the rules to start watching. We use ads to keep this free for you! 💖</div>
            <label style="display:flex; align-items:center; gap:10px; margin-bottom:15px; cursor:pointer;"><input type="checkbox" id="tos-checkbox" onchange="toggleAgreeBtn()"><span style="font-size:13px;">I promise to be good!</span></label>
            <button id="agreeBtn" class="agree-btn" onclick="acceptTOS()" disabled>START STREAMING 🍿</button>
        </div>
    </div>

    <!-- ADS -->
    <div id="top-banner" class="ad-slot">
        <script type="text/javascript">atOptions = { 'key' : '1dca73f5c59fdf49cbfe128bbf80c21a', 'format' : 'js', 'height' : 50, 'width' : 320, 'params' : {} };</script>
        <script type="text/javascript" src="//www.highperformanceformat.com/1dca73f5c59fdf49cbfe128bbf80c21a/invoke.js"></script>
    </div>

    <div id="main-container">
        <h1>TeraStream</h1>
        <input type="text" id="linkBox" class="input-box" placeholder="Paste Link...">
        <button class="play-btn" onclick="triggerAction('play')">Unlock & Play</button>
    </div>

    <div id="ad-overlay">
        <div class="timer-wrap" id="overlay-timer">4</div>
        <p style="color:#555; margin-top:10px;">Buffering Cloud...</p>
    </div>

    <div id="cinema-wrapper">
        <div style="padding:15px; background:#000;"><button onclick="location.reload()" style="background:#222; color:white; border:none; padding:10px; border-radius:8px;">⬅ BACK</button></div>
        <video id="mainPlayer" controls playsinline></video>
    </div>

<script>
    // --- 1. STOP THE FLICKER ---
    if(!localStorage.getItem('tos_final_v16')) {
        document.getElementById('tos-overlay').style.display = 'flex';
    }

    const VIDEO_LIMIT = 10;
    let apiReady = false;

    async function fetchVideo(url) {
        apiReady = false;
        try {
            // CALLING YOUR SECURE FUNCTION
            const res = await fetch('/.netlify/functions/getStream', {
                method: 'POST',
                body: JSON.stringify({ link: url })
            });
            const data = await res.json();
            if(data.result) {
                document.getElementById('mainPlayer').src = data.result.stream_url;
                apiReady = true;
            }
        } catch(e) { apiReady = "err"; }
    }

    function triggerAction(mode) {
        const link = document.getElementById('linkBox').value;
        if(!link.includes('tera')) return alert("Paste Link!");
        
        let count = parseInt(sessionStorage.getItem('v_count') || "0");
        if (count >= VIDEO_LIMIT) { window.location.href = "https://freeteraboxtwo.netlify.app"; return; }
        sessionStorage.setItem('v_count', count + 1);

        fetchVideo(link);
        document.getElementById('ad-overlay').style.display = 'flex';
        let t = 4;
        const clock = setInterval(() => {
            t--; document.getElementById('overlay-timer').innerText = t;
            if(t <= 0) { clearInterval(clock); checkAndLaunch(); }
        }, 1000);
    }

    function checkAndLaunch() {
        if(apiReady === true) {
            document.getElementById('ad-overlay').style.display = 'none';
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('top-banner').classList.add('hide-ads');
            document.getElementById('cinema-wrapper').style.display = 'flex';
            document.getElementById('mainPlayer').play();
        } else { setTimeout(checkAndLaunch, 30); }
    }

    function acceptTOS() { localStorage.setItem('tos_final_v16', '1'); document.getElementById('tos-overlay').style.display = 'none'; }
    function toggleAgreeBtn() { document.getElementById('agreeBtn').disabled = !document.getElementById('tos-checkbox').checked; document.getElementById('agreeBtn').className = document.getElementById('tos-checkbox').checked ? 'agree-btn active' : 'agree-btn'; }
</script>
</body>
</html>
