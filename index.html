<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeraStream Ultra - Max Revenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00e5ff; --bg: #050608; --accent: #00ff88; --surface: #0d0f14; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* --- TOS PERSISTENCE FIX --- */
        #tos-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .tos-box { background: var(--surface); border: 1px solid #1c1f26; width: 90%; max-width: 450px; padding: 30px; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* --- AD LAYOUT (MAX REVENUE) --- */
        .ad-banner { width: 100%; display: flex; justify-content: center; background: #000; padding: 10px 0; border-bottom: 1px solid #111; }
        .ad-box-300 { width: 300px; height: 250px; background: #0a0a0a; margin: 15px auto; border: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: center; position: relative; }
        .ad-box-300::before { content: 'SPONSORED'; position: absolute; top: -18px; left: 0; font-size: 10px; color: #444; }

        /* --- MAIN UI --- */
        #home-screen { padding: 20px; text-align: center; flex-grow: 1; }
        .input-wrap { margin: 30px 0; }
        .url-input { width: 100%; padding: 20px; border-radius: 16px; border: 2px solid #1c1f26; background: #000; color: #fff; font-size: 16px; transition: 0.3s; }
        .url-input:focus { border-color: var(--primary); outline: none; }
        .master-btn { width: 100%; padding: 20px; border-radius: 16px; border: none; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #000; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; }

        /* --- LOADING & TRANSITION --- */
        #loader-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px 0; }
        .timer-circle { width: 90px; height: 90px; border: 5px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 900; color: var(--primary); margin: 20px; }
        
        #preview-box { width: 92%; height: 200px; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid #222; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); margin-top: 10px; position: relative; }
        #preview-box.expanded { position: fixed; inset: 0; width: 100vw; height: 100vh; border-radius: 0; z-index: 50000; }

        /* --- VIDEO & QUALITY --- */
        video { width: 100%; height: 100%; object-fit: contain; }
        .player-ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: none; justify-content: space-between; z-index: 60000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .q-badge { background: var(--primary); color: #000; padding: 5px 12px; border-radius: 6px; font-weight: 800; font-size: 12px; cursor: pointer; }
        
        #q-panel { display: none; position: absolute; top: 60px; right: 15px; background: var(--surface); border: 1px solid #333; border-radius: 12px; width: 160px; z-index: 70000; overflow: hidden; }
        .q-row { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; }
        .q-row:hover { background: #1a1e26; }
        .q-row.active { color: var(--accent); }

        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- TOS SECTION (PERSISTENT) -->
    <div id="tos-overlay">
        <div class="tos-box">
            <h1 style="margin:0; color:var(--primary)">WELCOME</h1>
            <p style="color:#666; font-size:14px; margin: 15px 0 25px;">Stream high-speed cloud content. By clicking start, you agree to our premium streaming terms.</p>
            <button class="master-btn" onclick="acceptTOS()">I AGREE & START</button>
        </div>
    </div>

    <div id="home-screen">
        <div class="ad-banner">
            <script type="text/javascript">atOptions={'key':'1dca73f5c59fdf49cbfe128bbf80c21a','format':'js','height':50,'width':320,'params':{}};</script>
            <script type="text/javascript" src="//www.highperformanceformat.com/1dca73f5c59fdf49cbfe128bbf80c21a/invoke.js"></script>
        </div>

        <h1 style="font-size:32px; margin-bottom:0; font-weight:900;">TERA<span style="color:var(--primary)">STREAM</span></h1>
        <p style="color:var(--accent); font-size:11px; margin-top:0; letter-spacing:2px;">ULTRA-FAST DECODING</p>

        <div class="input-wrap">
            <input type="text" id="targetUrl" class="url-input" placeholder="Paste link here...">
        </div>
        <button class="master-btn" onclick="initiateFlow()">UNLOCK NOW</button>

        <div class="ad-box-300">
            <script type="text/javascript">atOptions={'key':'18ea0a28b5dca9cb89e786e8828bab39','format':'js','height':250,'width':300,'params':{}};</script>
            <script type="text/javascript" src="//www.highperformanceformat.com/18ea0a28b5dca9cb89e786e8828bab39/invoke.js"></script>
        </div>
    </div>

    <!-- LOADING & MONEY SCREEN -->
    <div id="loader-screen">
        <div class="timer-circle" id="timer">8</div>
        <p id="status-msg" style="color:#555; font-size:12px;">Connecting to secure cloud...</p>
        
        <div class="ad-box-300">
             <script type="text/javascript">atOptions={'key':'18ea0a28b5dca9cb89e786e8828bab39','format':'js','height':250,'width':300,'params':{}};</script>
             <script type="text/javascript" src="//www.highperformanceformat.com/18ea0a28b5dca9cb89e786e8828bab39/invoke.js"></script>
        </div>

        <!-- VIDEO PREVIEW -->
        <div id="preview-box">
            <video id="v-player" playsinline muted poster="https://via.placeholder.com/640x360/000000/00e5ff?text=Fetching+Stream..."></video>
            <div class="player-ui" id="v-controls">
                <button class="back-btn" onclick="location.reload()">⬅ BACK</button>
                <div class="q-badge" onclick="toggleQ()">⚙️ <span id="q-label">SMART: AUTO</span></div>
            </div>
            <div id="q-panel">
                <div class="q-row active" onclick="setQ('smart')">Smart (Auto)</div>
                <div class="q-row" onclick="setQ('1080p')">1080p Ultra</div>
                <div class="q-row" onclick="setQ('720p')">720p HD</div>
                <div class="q-row" onclick="setQ('360p')">360p Low</div>
            </div>
        </div>

        <div class="ad-box-300">
             <script type="text/javascript">atOptions={'key':'18ea0a28b5dca9cb89e786e8828bab39','format':'js','height':250,'width':300,'params':{}};</script>
             <script type="text/javascript" src="//www.highperformanceformat.com/18ea0a28b5dca9cb89e786e8828bab39/invoke.js"></script>
        </div>
    </div>

<script>
    // --- PERSISTENCE LOGIC ---
    window.onload = () => {
        if (!localStorage.getItem('tera_tos_v1')) {
            document.getElementById('tos-overlay').style.display = 'flex';
        }
    };

    function acceptTOS() {
        localStorage.setItem('tera_tos_v1', 'true');
        document.getElementById('tos-overlay').style.display = 'none';
    }

    // --- SMART QUALITY ---
    function getNetworkSpeed() {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (!conn) return "720p";
        if (conn.saveData) return "360p";
        const speed = conn.downlink; // Mbps
        return speed > 5 ? "1080p" : (speed > 2 ? "720p" : "360p");
    }

    let streamData = null;
    let timeRemaining = 8;

    async function fetchStream(url) {
        try {
            const res = await fetch('/.netlify/functions/getStream', {
                method: 'POST',
                body: JSON.stringify({ link: url })
            });
            streamData = await res.json();
            if (streamData.result) {
                const p = document.getElementById('v-player');
                p.src = streamData.result.stream_url;
                p.load();
            }
        } catch (e) { console.error("API error"); }
    }

    function initiateFlow() {
        const url = document.getElementById('targetUrl').value;
        if(!url.includes('tera')) return alert("Enter valid link");

        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('loader-screen').style.display = 'flex';
        
        fetchStream(url);

        const countdown = setInterval(() => {
            timeRemaining--;
            document.getElementById('timer').innerText = timeRemaining;

            // --- 2 SECONDS EARLY TRIGGER ---
            if (timeRemaining === 2) {
                document.getElementById('status-msg').innerText = "Buffering Stream...";
                document.getElementById('status-msg').style.color = 'var(--accent)';
                if(streamData) triggerTransition();
            }

            if (timeRemaining <= 0) {
                clearInterval(countdown);
                if(!streamData) waitForData();
            }
        }, 1000);
    }

    function waitForData() {
        if (streamData) triggerTransition();
        else setTimeout(waitForData, 500);
    }

    function triggerTransition() {
        const box = document.getElementById('preview-box');
        const player = document.getElementById('v-player');
        
        box.classList.add('expanded');
        document.getElementById('timer').style.display = 'none';
        document.getElementById('v-controls').style.display = 'flex';
        
        player.muted = false;
        player.play().catch(() => {
            // Fallback if browser blocks sound
            player.muted = true;
            player.play();
        });
        
        // Final Quality Update
        setQ('smart');
    }

    function toggleQ() {
        const p = document.getElementById('q-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function setQ(mode) {
        const label = document.getElementById('q-label');
        if (mode === 'smart') {
            const best = getNetworkSpeed();
            label.innerText = `SMART: ${best}`;
        } else {
            label.innerText = mode;
        }
        toggleQ();
    }
</script>
</body>
</html>
