        :root { --primary: #00e5ff; --bg: #08090d; --text-dim: #8b92a5; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; margin: 0; overflow-x: hidden; 
            display: flex; flex-direction: column; min-height: 100vh;
            user-select: none; -webkit-user-select: none;
        }

        /* --- ADS & UI --- */
        .ad-slot { width: 100%; min-height: 50px; background: #000; display: flex; justify-content: center; align-items: center; padding: 5px 0; border-bottom: 1px solid #1a1a1a; }
        #main-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        #home-screen { width: 100%; max-width: 500px; padding: 30px; background: rgba(255,255,255,0.02); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        
        h1 { font-weight: 800; font-size: 2.2rem; background: linear-gradient(90deg, #00e5ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .input-box { width: 100%; padding: 18px; border-radius: 14px; border: 1px solid #333; background: #000; color: #fff; margin: 15px 0; outline: none; font-size: 15px; user-select: text !important; }
        .play-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; background: linear-gradient(90deg, #00e5ff, #00ff88); color: black; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* --- 6-SEC OVERLAY --- */
        #ad-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.98); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(12px); }
        .big-ad-box { width: 300px; height: 250px; background: #000; border: 1px solid #222; border-radius: 12px; margin: 10px 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .timer-wrap { padding: 10px; width: 60px; height: 60px; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        #overlay-timer { font-size: 26px; font-weight: 800; color: var(--primary); }

        /* --- PLAYER & SETTINGS --- */
        #cinema-wrapper { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #000; z-index: 10000; flex-direction: column; }
        .top-bar { padding: 10px 20px; background: rgba(0,0,0,0.8); position: absolute; top: 0; width: 100%; z-index: 10001; display: flex; justify-content: space-between; align-items: center; }
        .quality-btn { background: #111; color: var(--primary); border: 1px solid var(--primary); padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .dl-icon { background: var(--primary); color: #000; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 12px; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* --- TOS --- */
        #tos-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 6, 8, 0.98); z-index: 20000; display: flex; justify-content: center; align-items: center; }
        .tos-content { background: #0d0f14; border: 1px solid #1c1f26; width: 90%; max-width: 500px; padding: 25px; border-radius: 20px; text-align: center; }
    </style>
</head>

<script>
    let fetchedStreams = {};
    let directLink = "";
    let apiReady = false;
    let userNetwork = "fast"; 

    /* --- NETWORK SAVER LOGIC --- */
    function checkNetwork() {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
            const type = conn.effectiveType; // '4g', '3g', etc.
            const statusEl = document.getElementById('net-status');
            if (type.includes('2g') || type === '3g') {
                userNetwork = "slow";
                statusEl.innerText = "Network: Slow (Saver Active ⚡)";
            } else {
                userNetwork = "fast";
                statusEl.innerText = "Network: High Speed (HD Ready)";
            }
        }
    }
    checkNetwork();

    async function preloadVideo(url) {
        try {
            const res = await fetch('https://terabox-downloader-api2.p.rapidapi.com/v1', {
                method: 'POST',
                headers: {
                    'x-rapidapi-key': 'f26f059259msh01744200cf35cdap1a2e94jsn87882966dadc',
                    'x-rapidapi-host': 'terabox-downloader-api2.p.rapidapi.com',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ platform: "terabox", media_type: "video", quality: "auto", link: url })
            });
            const data = await res.json();
            if(data.result) {
                fetchedStreams = data.result.fast_streams || {};
                directLink = data.result.direct_link || "";
                
                const qSelect = document.getElementById('qualitySelect');
                qSelect.innerHTML = '';
                
                // AUTO-SELECT BASED ON NETWORK
                let targetQual = (userNetwork === "slow") ? "360p" : "720p";
                let bestMatch = data.result.stream_url;

                for (let q in fetchedStreams) {
                    let opt = document.createElement('option');
                    opt.value = fetchedStreams[q];
                    opt.innerText = q;
                    if(q === targetQual || (!fetchedStreams[targetQual] && q === '480p')) {
                        opt.selected = true;
                        bestMatch = fetchedStreams[q];
                    }
                    qSelect.appendChild(opt);
                }

                const player = document.getElementById('mainPlayer');
                player.src = bestMatch;
                player.load(); // BUFFERING STARTS HERE (DURING TIMER)
                apiReady = true;
            } else { apiReady = "error"; }
        } catch (e) { apiReady = "error"; }
    }

    function startAction(mode) {
        const url = document.getElementById('linkBox').value;
        if(!url.includes('tera')) return alert("Paste Link!");

        document.getElementById('ad-overlay').style.display = 'flex';
        if(mode === 'play') preloadVideo(url);

        let count = 6;
        const timerEl = document.getElementById('overlay-timer');
        const interval = setInterval(() => {
            count--;
            timerEl.innerText = count;
            if(count <= 0) {
                clearInterval(interval);
                executeAction(mode);
            }
        }, 1000);
    }

    // FAST-CHECK CYCLE (100ms)
    function executeAction(mode) {
        if (mode === 'play') {
            if (apiReady === true) {
                document.getElementById('ad-overlay').style.display = 'none';
                document.getElementById('main-container').style.display = 'none';
                document.getElementById('cinema-wrapper').style.display = 'flex';
                document.getElementById('mainPlayer').play(); 
            } else if (apiReady === "error") {
                alert("API Error"); location.reload();
            } else {
                setTimeout(() => executeAction('play'), 100); // Check again in 0.1s
            }
        } else {
            document.getElementById('ad-overlay').style.display = 'none';
            window.open(directLink || fetchedStreams['720p'], '_blank');
        }
    }

    function changeQuality() {
        const player = document.getElementById('mainPlayer');
        const qSelect = document.getElementById('qualitySelect');
        const currentTime = player.currentTime;
        player.src = qSelect.value;
        player.onloadedmetadata = () => { player.currentTime = currentTime; player.play(); };
    }

    function acceptTOS() { localStorage.setItem('ts_ok', '1'); document.getElementById('tos-overlay').style.display = 'none'; }
    window.onload = () => { if(localStorage.getItem('ts_ok')) document.getElementById('tos-overlay').style.display='none'; }
</script>
