<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeraStream Ultra - Max Revenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00e5ff; --bg: #030405; --accent: #00ff88; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; overflow-x: hidden; }

        /* --- THE AD ARCHITECTURE (MAX DENSITY) --- */
        .ad-row { width: 100%; display: flex; justify-content: center; background: #000; padding: 5px 0; border-bottom: 1px solid #111; }
        .sticky-side { position: fixed; top: 80px; width: 160px; height: 600px; background: #000; z-index: 5; border: 1px solid #222; display: none; }
        .left-side { left: 5px; } .right-side { right: 5px; }

        #main-ui { max-width: 480px; margin: 15px auto; padding: 15px; text-align: center; position: relative; z-index: 10; }
        .input-box { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #1c202a; background: #000; color: #fff; font-size: 16px; margin-bottom: 10px; }
        .btn-unlock { width: 100%; padding: 22px; border-radius: 15px; border: none; background: linear-gradient(90deg, var(--primary), var(--accent)); color: #000; font-weight: 900; font-size: 20px; cursor: pointer; box-shadow: 0 0 30px rgba(0, 229, 255, 0.5); }

        /* --- THE MONEY OVERLAY (TIMER + PRE-LOAD) --- */
        #ad-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 10000; 
            display: none; flex-direction: column; align-items: center; overflow-y: auto; padding: 10px;
        }
        .timer-unit { width: 80px; height: 80px; border: 5px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: 900; color: var(--primary); margin: 10px; }
        
        /* Ghost Player: Buffers in background */
        #ghost-container { 
            width: 100%; max-width: 400px; height: 220px; background: #050505; border-radius: 15px; 
            margin: 10px 0; border: 2px solid #111; overflow: hidden; position: relative;
        }
        #ghost-container.buffering { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* --- CINEMA MODE (THE FINAL STAGE) --- */
        #cinema-wrapper { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; flex-direction: column; }
        .top-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #090a0c; border-bottom: 1px solid #1a1a1a; }
        #video-stage { flex-shrink: 0; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; max-height: 50vh; }
        
        .q-badge { background: #333; color: var(--primary); padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; }
        .ad-grid-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; }
        .grid-box { background: #0a0a0a; border: 1px solid #111; border-radius: 10px; display: flex; align-items: center; justify-content: center; min-height: 200px; }

        @media (min-width: 1200px) { .sticky-side { display: block; } }
    </style>
</head>
<body>

    <!-- TOP AD SPACE -->
    <div class="ad-row">
        <script type="text/javascript">atOptions={'key':'1dca73f5c59fdf49cbfe128bbf80c21a','format':'js','height':50,'width':320,'params':{}};</script>
        <script src="//www.highperformanceformat.com/1dca73f5c59fdf49cbfe128bbf80c21a/invoke.js"></script>
    </div>

    <!-- PC SIDEBAR ADS -->
    <div class="sticky-side left-side">
        <!-- Ad tag here -->
    </div>
    <div class="sticky-side right-side">
        <!-- Ad tag here -->
    </div>

    <div id="main-ui">
        <h1 style="font-size: 45px; font-weight: 900; margin: 0;">TERA<span style="color:var(--primary)">STREAM</span></h1>
        <p style="color:var(--accent); font-weight: 700; letter-spacing: 3px; font-size: 11px; margin-top: -5px;">PREMIUM CLOUD BYPASS</p>
        
        <input type="text" id="userInput" class="input-box" placeholder="Paste Terabox Link...">
        <button class="btn-unlock" onclick="initFlow()">UNLOCK VIDEO</button>

        <!-- NATIVE NATIVE AD -->
        <div style="margin-top: 20px; border: 1px solid #111; border-radius: 10px; padding: 10px;">
            <script async="async" data-cfasync="false" src="https://pl29436277.profitablecpmratenetwork.com/f66769b56b44248314261841a0e4e0c9/invoke.js"></script>
            <div id="container-f66769b56b44248314261841a0e4e0c9"></div>
        </div>
    </div>

    <!-- REVENUE LOADING OVERLAY -->
    <div id="ad-overlay">
        <div class="timer-unit" id="timer">7</div>
        <p id="status" style="font-weight: 700; color: #444;">Optimizing for your connection...</p>

        <!-- OVERLAY ADS (TWO BIG BLOCKS) -->
        <div class="grid-box" style="width: 300px; height: 250px; margin-bottom: 15px;">
            <script type="text/javascript">atOptions={'key':'18ea0a28b5dca9cb89e786e8828bab39','format':'js','height':250,'width':300,'params':{}};</script>
            <script src="//www.highperformanceformat.com/18ea0a28b5dca9cb89e786e8828bab39/invoke.js"></script>
        </div>

        <!-- THE GHOST PLAYER (Hidden loading zone) -->
        <div id="ghost-container">
            <video id="corePlayer" controls playsinline muted poster="https://i.imgur.com/8FpY4H9.png"></video>
        </div>

        <div class="grid-box" style="width: 300px; height: 250px; margin-top: 15px;">
            <!-- Another Big Ad -->
        </div>
    </div>

    <!-- THE CINEMA (VIDEO PLAYER PAGE) -->
    <div id="cinema-wrapper">
        <div class="top-bar">
            <button onclick="location.reload()" style="background:#111; color:#fff; border:1px solid #222; padding:8px 15px; border-radius:8px;">← BACK</button>
            <span id="net-quality" class="q-badge">DETECTING...</span>
        </div>
        
        <div id="video-stage">
            <!-- Video hops here at T-0 -->
        </div>

        <!-- ADS UNDER PLAYER (GRID) -->
        <div class="ad-grid-bottom">
            <div class="grid-box">AD SLOT 1</div>
            <div class="grid-box">AD SLOT 2</div>
            <div class="grid-box">AD SLOT 3</div>
            <div class="grid-box">AD SLOT 4</div>
        </div>
    </div>

    <script>
        let apiResolved = false;
        let finalStream = "";
        let timeRemaining = 7;

        // 1. SMART NETWORK CHECK
        function checkNetwork() {
            const n = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (n) {
                if (n.saveData) return "360p (DATA SAVER)";
                if (n.downlink < 2) return "480p (STABLE)";
                return "1080p (ULTRA)";
            }
            return "720p (SMART)";
        }

        // 2. BACK BUTTON RESET
        window.onpopstate = () => location.reload();

        // 3. THE TRIGGER
        function initFlow() {
            const url = document.getElementById('userInput').value;
            if (!url.includes('tera')) return alert("Enter Terabox Link!");

            document.getElementById('ad-overlay').style.display = 'flex';
            document.getElementById('net-quality').innerText = checkNetwork();
            window.history.pushState({view: 'ads'}, '');

            // Start Fetching immediately in background
            startBackgroundFetch(url);

            const counter = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer').innerText = timeRemaining;

                // --- THE 2-SECOND TRIGGER ---
                // We start moving/preparing the player 2 seconds before the timer ends
                if (timeRemaining === 2) {
                    if (apiResolved) {
                        document.getElementById('ghost-container').classList.add('buffering');
                        document.getElementById('status').innerText = "Ready! Finalizing stream...";
                        document.getElementById('status').style.color = "var(--accent)";
                    } else {
                        timeRemaining++; // Pause timer if API hasn't replied yet
                        document.getElementById('status').innerText = "Server busy, retrying...";
                    }
                }

                if (timeRemaining <= 0) {
                    clearInterval(counter);
                    switchToCinema();
                }
            }, 1000);
        }

        // 4. BACKGROUND FETCH (API)
        function startBackgroundFetch(link) {
            // Simulated Fetch - Replace with your actual Netlify function call
            setTimeout(() => {
                finalStream = "https://www.w3schools.com/html/mov_bbb.mp4"; // API RESULT
                const p = document.getElementById('corePlayer');
                p.src = finalStream;
                p.load(); // Start buffering
                apiResolved = true;
            }, 2000);
        }

        // 5. SWITCH TO FULL VIEW
        function switchToCinema() {
            const p = document.getElementById('corePlayer');
            const stage = document.getElementById('video-stage');
            
            // Move player to cinema stage
            stage.appendChild(p);
            p.muted = false; 
            
            document.getElementById('ad-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('cinema-wrapper').style.display = 'flex';
            
            p.play().catch(e => console.log("User must click play manually"));
        }
    </script>
</body>
</html>
